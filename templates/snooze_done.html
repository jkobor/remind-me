<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Snoozed — Remind Me</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@picocss/pico@2/css/pico.min.css">
  <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>
  <main class="container">

    <header>
      <h1>&#x23F0; Remind Me</h1>
    </header>

    <article>
      <header><strong>&#x1F4A4; Snoozed!</strong></header>
      <p>
        Got it! I'll remind you about <strong>{{ task }}</strong> again at
        <code class="time-cell" data-utc="{{ remind_at_utc }}">{{ remind_at_utc }}</code>.
      </p>
      <a href="/" role="button" class="outline">&#x2190; Back to Remind Me</a>
    </article>

  </main>

  <script>
    document.querySelectorAll('[data-utc]').forEach(cell => {
      const utc = cell.dataset.utc;
      if (!utc) return;
      const date = new Date(utc);
      const parts = new Intl.DateTimeFormat(undefined, {
        year: 'numeric', month: '2-digit', day: '2-digit',
        hour: '2-digit', minute: '2-digit', hour12: false,
        timeZoneName: 'short'
      }).formatToParts(date);
      const get = type => parts.find(p => p.type === type)?.value ?? '';
      cell.textContent = `${get('year')}-${get('month')}-${get('day')} ${get('hour')}:${get('minute')} ${get('timeZoneName')}`;
    });
  </script>
</body>
</html>
